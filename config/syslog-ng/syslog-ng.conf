@version: 4.8
@include "scl.conf"

options {
  keep-hostname(yes);
  chain-hostnames(no);
  create-dirs(yes);
  flush-lines(1);
  log-msg-size(65536);
  stats(level(1));
  time-reopen(10);
  use-dns(no);
  use-fqdn(no);
};

source s_udp_514 {
  udp(ip("0.0.0.0") port(514) so_rcvbuf(262144));
};

source s_tcp_514 {
  tcp(ip("0.0.0.0") port(514) max-connections(100));
};

destination d_all_logs {
  file(
    "/var/log/remote/all/${YEAR}/${MONTH}/${DAY}/messages.log"
    create-dirs(yes)
    template("${ISODATE} ${HOST} ${PROGRAM} ${MSGHDR}${MSG}\n")
  );
};

destination d_unifi_logs {
  file(
    "/var/log/remote/unifi/${YEAR}/${MONTH}/${DAY}/messages.log"
    create-dirs(yes)
    template("${ISODATE} ${HOST} ${PROGRAM} ${MSGHDR}${MSG}\n")
  );
};

destination d_wazuh {
  network(
    "wazuh.manager"
    transport("tcp")
    port(514)
    log-fifo-size(10000)
  );
};

filter f_unifi {
  match("UniFi" value("MESSAGE") type("string")) or
  match("Ubiquiti" value("MESSAGE") type("string")) or
  match("CEF:" value("MESSAGE") type("string")) or
  match("unifi" value("HOST") type("string"));
};

log {
  source(s_udp_514);
  destination(d_all_logs);
  destination(d_wazuh);
};

log {
  source(s_tcp_514);
  destination(d_all_logs);
  destination(d_wazuh);
};

log {
  source(s_udp_514);
  filter(f_unifi);
  destination(d_unifi_logs);
};

log {
  source(s_tcp_514);
  filter(f_unifi);
  destination(d_unifi_logs);
};
